name: Sync Captação → CRM

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de sync
        run: |
          response=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST "${{ secrets.CRM_URL }}/api/sheets/sync-captacao" \
            -H "x-sync-secret: ${{ secrets.SHEETS_SYNC_SECRET }}" \
            -H "Content-Type: application/json")
          body=$(cat /tmp/sync_response.json)
          echo "Status HTTP: $response"
          echo "Resposta: $body"
          if [ "$response" != "200" ]; then
            echo "Erro no sync!" && exit 1
          fi
